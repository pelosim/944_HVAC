<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
<title>944S · Sport Chrono</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; background: #000; overflow: hidden; cursor: none; }
  #wrap { width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center; background: #000; }
  svg { width: min(100vw, 100vh); height: min(100vw, 100vh); display: block; }
  .num   { fill: #eef1f4; font-family: 'Helvetica Neue', Arial, sans-serif; font-weight: 600; font-size: 44px; }
  .brand { fill: #d9dde1; font-family: 'Helvetica Neue', Arial, sans-serif; font-weight: 700; font-size: 30px; letter-spacing: 13px; }
  .sport { fill: #b9bdc2; font-family: 'Helvetica Neue', Arial, sans-serif; font-weight: 600; font-size: 19px; letter-spacing: 7px; }
</style>
</head>
<body>
<div id="wrap">
  <svg viewBox="0 0 1000 1000" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <radialGradient id="face" cx="50%" cy="42%" r="66%">
        <stop offset="0%" stop-color="#191b20" />
        <stop offset="62%" stop-color="#0d0e12" />
        <stop offset="100%" stop-color="#030304" />
      </radialGradient>
      <linearGradient id="bezel" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#e9edf0" />
        <stop offset="18%" stop-color="#a7adb4" />
        <stop offset="50%" stop-color="#4c5157" />
        <stop offset="82%" stop-color="#9aa0a7" />
        <stop offset="100%" stop-color="#d7dbdf" />
      </linearGradient>
      <linearGradient id="bezel2" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#34373c" />
        <stop offset="50%" stop-color="#0d0e11" />
        <stop offset="100%" stop-color="#34373c" />
      </linearGradient>
      <linearGradient id="hand" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#ffffff" />
        <stop offset="100%" stop-color="#c4c8cc" />
      </linearGradient>
      <radialGradient id="cap" cx="42%" cy="38%" r="70%">
        <stop offset="0%" stop-color="#eceef0" />
        <stop offset="45%" stop-color="#9aa0a6" />
        <stop offset="100%" stop-color="#2a2d31" />
      </radialGradient>
    </defs>

    <!-- bezel + face -->
    <circle cx="500" cy="500" r="498" fill="url(#bezel)" />
    <circle cx="500" cy="500" r="470" fill="url(#bezel2)" />
    <circle cx="500" cy="500" r="452" fill="url(#face)" />
    <circle cx="500" cy="500" r="452" fill="none" stroke="#000" stroke-width="2" opacity="0.6" />

    <g id="ticks"></g>
    <g id="nums"></g>

    <text x="500" y="330" text-anchor="middle" class="brand">PORSCHE</text>
    <text x="500" y="648" text-anchor="middle" class="sport">SPORT CHRONO</text>

    <!-- hands (no SVG filters — feDropShadow is unreliable on the Pi V3D GPU) -->
    <g id="hour"><rect x="491" y="272" width="18" height="258" rx="9" fill="url(#hand)" stroke="#20242a" stroke-width="1" /></g>
    <g id="min"><rect x="494" y="172" width="12" height="360" rx="6" fill="url(#hand)" stroke="#20242a" stroke-width="1" /></g>
    <g id="sec">
      <line x1="500" y1="582" x2="500" y2="150" stroke="#D5001C" stroke-width="6" stroke-linecap="round" />
      <circle cx="500" cy="562" r="24" fill="#0d0e12" stroke="#D5001C" stroke-width="6" />
      <circle cx="500" cy="500" r="9" fill="#D5001C" />
    </g>
    <circle cx="500" cy="500" r="17" fill="url(#cap)" />
    <circle cx="500" cy="500" r="17" fill="none" stroke="#1a1c1f" stroke-width="1.5" />
  </svg>
</div>
<script>
(function () {
  var NS = "http://www.w3.org/2000/svg";
  var ticks = document.getElementById("ticks");
  for (var i = 0; i < 60; i++) {
    var a = i * 6 * Math.PI / 180, isH = (i % 5 === 0);
    var r1 = 430, r2 = isH ? 396 : 418;
    var l = document.createElementNS(NS, "line");
    l.setAttribute("x1", 500 + r1 * Math.sin(a)); l.setAttribute("y1", 500 - r1 * Math.cos(a));
    l.setAttribute("x2", 500 + r2 * Math.sin(a)); l.setAttribute("y2", 500 - r2 * Math.cos(a));
    l.setAttribute("stroke", isH ? "#e9ecef" : "#6a6f75");
    l.setAttribute("stroke-width", isH ? 7 : 2.5);
    l.setAttribute("stroke-linecap", "round");
    ticks.appendChild(l);
  }
  var nums = document.getElementById("nums");
  for (var n = 1; n <= 12; n++) {
    var a2 = n * 30 * Math.PI / 180, r = 352;
    var t = document.createElementNS(NS, "text");
    t.setAttribute("x", 500 + r * Math.sin(a2)); t.setAttribute("y", 500 - r * Math.cos(a2));
    t.setAttribute("text-anchor", "middle"); t.setAttribute("dominant-baseline", "central");
    t.setAttribute("class", "num"); t.textContent = n;
    nums.appendChild(t);
  }
  var H = document.getElementById("hour"), M = document.getElementById("min"), S = document.getElementById("sec");
  function frame() {
    var d = new Date();
    var s = d.getSeconds() + d.getMilliseconds() / 1000;
    var m = d.getMinutes() + s / 60;
    var h = (d.getHours() % 12) + m / 60;
    H.setAttribute("transform", "rotate(" + (h * 30) + " 500 500)");
    M.setAttribute("transform", "rotate(" + (m * 6) + " 500 500)");
    S.setAttribute("transform", "rotate(" + (s * 6) + " 500 500)");
    requestAnimationFrame(frame);
  }
  frame();
})();
</script>
</body>
</html>
